<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helmet Detection System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e293b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 50px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 2.5rem;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-sub);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .upload-area {
            border: 2px dashed var(--glass-border);
            border-radius: 15px;
            padding: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 15px;
            color: var(--accent);
        }

        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            box-shadow: none;
        }

        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-section {
            margin-top: 40px;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .result-section.show {
            display: block;
            opacity: 1;
        }

        .result-image {
            max-width: 100%;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Helmet Detection</h1>
        <p class="subtitle">Upload an image to detect safety helmets instantly.</p>
        
        <form id="uploadForm">
            <div class="upload-area" id="dropZone">
                <div class="upload-icon">📁</div>
                <p style="font-weight: 600; margin-bottom: 5px;" id="fileText">Drag & Drop an image here</p>
                <p style="color: var(--text-sub); font-size: 0.9rem; margin-top: 0;">or click to browse</p>
                <input type="file" id="fileInput" accept="image/*" required>
            </div>
            <button type="submit" class="btn" id="analyzeBtn" disabled>Analyze Image</button>
        </form>

        <div class="loader" id="loader"></div>

        <div class="result-section" id="resultSection">
            <h2 style="font-weight: 600; margin-bottom: 10px;">Analysis Complete</h2>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="objectCount">0</div>
                    <div class="stat-label">Objects Detected</div>
                </div>
            </div>
            <img id="resultImage" class="result-image" alt="Processed Result">
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadForm = document.getElementById('uploadForm');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const fileText = document.getElementById('fileText');
        const dropZone = document.getElementById('dropZone');
        const loader = document.getElementById('loader');
        const resultSection = document.getElementById('resultSection');
        const resultImage = document.getElementById('resultImage');
        const objectCount = document.getElementById('objectCount');

        // Handle file selection
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileText.textContent = e.target.files[0].name;
                analyzeBtn.disabled = false;
            } else {
                fileText.textContent = 'Drag & Drop an image here';
                analyzeBtn.disabled = true;
            }
        });

        // Handle drag and drop visuals
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // Handle form submission
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            // UI updates
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = 'Processing...';
            loader.style.display = 'block';
            resultSection.classList.remove('show');

            try {
                const response = await fetch('/predict/', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();
                
                // Update UI with results
                resultImage.src = data.result_url;
                objectCount.textContent = data.detections.length;
                
                resultImage.onload = () => {
                    loader.style.display = 'none';
                    resultSection.classList.add('show');
                    analyzeBtn.disabled = false;
                    analyzeBtn.textContent = 'Analyze Another';
                };
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred during analysis.');
                loader.style.display = 'none';
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = 'Analyze Image';
            }
        });
    </script>
</body>
</html>
